<!DOCTYPE html><html lang='ja'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Adventure Ver0.1</title><style>
body{margin:0;font-family:sans-serif;background:linear-gradient(#17345f,#6bbcff);color:#fff}
.page{display:none;padding:20px;max-width:700px;margin:auto;min-height:100vh}
.active{display:block}.card{background:rgba(0,0,0,.25);padding:20px;border-radius:16px;margin-top:20px}
button{width:100%;padding:14px;margin:8px 0;border:0;border-radius:10px;background:#e0b44d;font-size:18px}
.bar{height:14px;background:#555;border-radius:8px}.fill{height:14px;width:0;background:#62e36d;border-radius:8px}
</style></head><body>
<div id='t' class='page active'><div class='card'><h1>⚔️こうすけとしゅんすけの冒険の書</h1><p>学校は毎日が冒険だ。</p><button onclick='show("p")'>▶冒険をはじめる</button></div></div>
<div id='p' class='page'><div class='card'><h2>主人公を選ぼう</h2><button onclick='sel("こうすけ")'>こうすけ</button><button onclick='sel("しゅんすけ")'>しゅんすけ</button></div></div>
<div id='h' class='page'><div class='card'><h2 id='w'></h2><p>🏯城下町 Lv1</p><div class='bar'><div class='fill'></div></div><p>EXP0/100</p><button onclick='show("m")'>🏕️白樺湖編</button><button disabled>🏫学校編(次回)</button></div></div>
<div id='m' class='page'><div class='card'><h2>🗺️白樺湖マップ</h2><p>🚌→🌲→🏨→🔥→🐄→🌌→🏆</p><button onclick='show("h")'>戻る</button></div></div>
<script>
function show(id){document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));document.getElementById(id).classList.add('active')}
function sel(n){localStorage.setItem('player',n);document.getElementById('w').textContent='ようこそ '+n+'！';show('h')}
window.onload=()=>{let p=localStorage.getItem('player');if(p)document.getElementById('w').textContent='ようこそ '+p+'！';}
</script></body></html>
