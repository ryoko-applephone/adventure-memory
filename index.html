<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>こうすけとしゅんすけの冒険の書 Ver0.2 Part1</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="titleScreen" class="screen">
  <div class="bg-layer mountains"></div>
  <div class="bg-layer clouds"></div>

  <main class="title-card">
    <h1>⚔️ こうすけとしゅんすけの冒険の書</h1>
    <p>学校は毎日が冒険だ。</p>

    <button id="startButton">▶ 冒険をはじめる</button>

    <div class="version">
      Ver0.2 Part1
    </div>
  </main>
</div>

<div id="playerScreen" class="screen hidden">
  <h2>主人公を選ぼう</h2>

  <div class="player-list">
    <button class="player" data-player="こうすけ">
      ⚔️ こうすけ
    </button>

    <button class="player" data-player="しゅんすけ">
      ⚔️ しゅんすけ
    </button>
  </div>
</div>

<div id="homeScreen" class="screen hidden">

<header>

<h2 id="playerName">
ようこそ！
</h2>

<div class="status">

<div class="level">
Lv.1
</div>

<div class="exp">
<div id="expBar"></div>
</div>

</div>

</header>

<section class="castle-area">

<div class="castle">
🏯
</div>

<p>
城下町はまだ小さな村です。<br>
冒険を進めると少しずつ発展します。
</p>

</section>

<section class="menu">

<button id="shirakabaButton">
🏕 白樺湖編
</button>

<button disabled>
🏫 学校編（近日追加）
</button>

<button disabled>
🎖 バッジ
</button>

</section>

</div>

<div id="mapScreen" class="screen hidden">

<h2>🗺 白樺湖マップ</h2>

<ul class="map">

<li>🚌 出発</li>
<li>⬇</li>
<li>🌲 オリエンテーリング</li>
<li>⬇</li>
<li>🏨 ホテル</li>
<li>⬇</li>
<li>🔥 キャンプファイヤー</li>
<li>⬇</li>
<li>🐄 牧場</li>
<li>⬇</li>
<li>🌌 ナイトウォーク</li>
<li>⬇</li>
<li>🏆 ゴール</li>

</ul>

<button id="backButton">
ホームへ戻る
</button>

</div>

<script src="script.js"></script>

</body>
</html>
